<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mentoring Workspace</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="identity">
          <h1 id="projectTitle">Mentoring Workspace</h1>
          <p id="peopleSummary">Mentor / Mentee</p>
        </div>

        <div class="topbar-actions">
          <button class="icon-button" id="settingsButton" type="button" aria-label="Settings">Settings</button>
        </div>
      </header>

      <main class="workspace">
        <section class="work-grid">
          <form class="panel daily-panel" id="dailyLogForm">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Daily log</p>
                <h2>What changed today?</h2>
              </div>
              <label class="date-field">
                <span>Date</span>
                <input id="logDate" name="date" type="date" required>
              </label>
            </div>

            <label class="field-row">
              <span>
                <strong>Worked on</strong>
                <small>One or two concrete items.</small>
              </span>
              <textarea id="workedOn" name="workedOn" rows="4" placeholder="Summarize the work completed today..."></textarea>
            </label>

            <label class="field-row">
              <span>
                <strong>Notes</strong>
                <small>Results, decisions, links, questions.</small>
              </span>
              <textarea id="notes" name="notes" rows="4" placeholder="Important observations or context..."></textarea>
            </label>

            <label class="field-row">
              <span>
                <strong>Blockers</strong>
                <small>Anything slowing progress.</small>
              </span>
              <textarea id="blockers" name="blockers" rows="3" placeholder="Access, data, code, conceptual blockers..."></textarea>
            </label>

            <label class="field-row">
              <span>
                <strong>Next step</strong>
                <small>The next useful action.</small>
              </span>
              <textarea id="nextStep" name="nextStep" rows="3" placeholder="What should happen next?"></textarea>
            </label>

            <div class="form-actions">
              <button class="primary-button" id="submitLogButton" type="submit">Submit entry</button>
              <button class="secondary-button" id="clearLogButton" type="button">Clear</button>
            </div>
          </form>

          <section class="panel tasks-panel" aria-labelledby="tasksTitle">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Tasks</p>
                <h2 id="tasksTitle">Shared task list</h2>
              </div>
              <div class="status-summary" id="statusSummary"></div>
            </div>

            <div class="task-controls">
              <label class="compact-field task-title-field">
                <span>Task</span>
                <input id="newTaskTitle" type="text" placeholder="Add a new task...">
              </label>
              <label class="compact-field">
                <span>Assignee</span>
                <input id="newTaskAssignee" list="peopleOptions" type="text" placeholder="Person">
              </label>
              <label class="compact-field">
                <span>Status</span>
                <select id="newTaskStatus" aria-label="New task status">
                  <option value="not_started">Not started</option>
                  <option value="in_progress">In progress</option>
                  <option value="waiting">Waiting</option>
                  <option value="blocked">Blocked</option>
                  <option value="done">Done</option>
                </select>
              </label>
              <label class="compact-field">
                <span>Do date</span>
                <input id="newTaskScheduledDate" type="date">
              </label>
              <label class="compact-field">
                <span>Deadline</span>
                <input id="newTaskDeadline" type="date">
              </label>
              <button class="primary-button add-task-button" id="addTaskButton" type="button">Add</button>
            </div>

            <label class="compact-field task-filter">
              <span>Show</span>
              <select id="taskStatusFilter" aria-label="Task status filter">
                <option value="all">All tasks</option>
                <option value="active">Active tasks</option>
                <option value="not_started">Not started</option>
                <option value="in_progress">In progress</option>
                <option value="waiting">Waiting</option>
                <option value="blocked">Blocked</option>
                <option value="done">Done</option>
              </select>
            </label>

            <div class="task-list" id="taskList"></div>
          </section>
        </section>

        <section class="timeline-panel" aria-labelledby="timelineTitle">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Timeline</p>
              <h2 id="timelineTitle">Tasks and entries by day</h2>
            </div>
            <div class="status-summary" id="timelineSummary"></div>
          </div>

          <div class="timeline-filters" aria-label="Timeline filters">
            <label class="compact-field timeline-search">
              <span>Search</span>
              <input id="timelineSearch" type="search" placeholder="Filter text...">
            </label>
            <label class="compact-field">
              <span>Type</span>
              <select id="timelineTypeFilter">
                <option value="all">All</option>
                <option value="task">Tasks</option>
                <option value="log">Entries</option>
              </select>
            </label>
            <label class="compact-field">
              <span>Person</span>
              <select id="timelinePersonFilter"></select>
            </label>
            <label class="compact-field">
              <span>Status</span>
              <select id="timelineStatusFilter">
                <option value="all">All</option>
                <option value="not_started">Not started</option>
                <option value="in_progress">In progress</option>
                <option value="waiting">Waiting</option>
                <option value="blocked">Blocked</option>
                <option value="done">Done</option>
              </select>
            </label>
            <label class="compact-field">
              <span>Date</span>
              <select id="timelineDateFilter">
                <option value="all">All dates</option>
                <option value="today">Today</option>
                <option value="upcoming">Upcoming</option>
                <option value="overdue">Overdue</option>
                <option value="unscheduled">Unscheduled</option>
              </select>
            </label>
          </div>

          <div class="timeline-list" id="timelineList"></div>
        </section>

        <section class="sync-panel" aria-labelledby="syncTitle">
          <div>
            <p class="eyebrow" id="syncTitle">Sync</p>
            <h2 id="syncMode">Local preview</h2>
          </div>
          <div class="sync-targets">
            <a class="sync-card" id="docLink" href="#" target="_blank" rel="noreferrer">
              <span class="file-icon doc" aria-hidden="true"></span>
              <span>
                <strong>Daily log document</strong>
                <small id="docStatus">Not connected</small>
              </span>
            </a>
            <a class="sync-card" id="sheetLink" href="#" target="_blank" rel="noreferrer">
              <span class="file-icon sheet" aria-hidden="true"></span>
              <span>
                <strong>Task spreadsheet</strong>
                <small id="sheetStatus">Not connected</small>
              </span>
            </a>
          </div>
          <button class="secondary-button" id="syncNowButton" type="button">Sync now</button>
        </section>
      </main>
    </div>

    <dialog class="modal" id="taskDialog">
      <form id="taskForm">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Task</p>
            <h2 id="taskDialogTitle">Edit task</h2>
          </div>
          <button class="icon-close" id="closeTaskDialogButton" type="button" aria-label="Close">x</button>
        </div>
        <label class="stacked-field">
          Title
          <input id="taskTitleInput" type="text" required>
        </label>
        <div class="modal-grid">
          <label class="stacked-field">
            Assignee
            <input id="taskAssigneeInput" list="peopleOptions" type="text">
          </label>
          <label class="stacked-field">
            Status
            <select id="taskStatusInput">
              <option value="not_started">Not started</option>
              <option value="in_progress">In progress</option>
              <option value="waiting">Waiting</option>
              <option value="blocked">Blocked</option>
              <option value="done">Done</option>
            </select>
          </label>
          <label class="stacked-field">
            Do date
            <input id="taskScheduledDateInput" type="date">
          </label>
          <label class="stacked-field">
            Deadline
            <input id="taskDeadlineInput" type="date">
          </label>
        </div>
        <div class="modal-actions">
          <button class="secondary-button" id="cancelTaskButton" type="button">Cancel</button>
          <button class="primary-button" type="submit">Save task</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="settingsDialog">
      <form method="dialog">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>Storage</h2>
          </div>
          <button class="icon-close" value="cancel" type="submit" aria-label="Close">x</button>
        </div>
        <div class="settings-list">
          <div>
            <span>Mode</span>
            <strong id="settingsMode">Local preview</strong>
          </div>
          <div>
            <span>Last sync</span>
            <strong id="settingsLastSync">Never</strong>
          </div>
        </div>
        <div class="modal-actions">
          <button class="secondary-button" id="exportButton" type="button">Export JSON</button>
          <button class="danger-button" id="resetButton" type="button">Reset local data</button>
          <button class="primary-button" value="cancel" type="submit">Done</button>
        </div>
      </form>
    </dialog>

    <datalist id="peopleOptions"></datalist>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
  </body>
</html>
